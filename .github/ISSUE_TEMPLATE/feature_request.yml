name: Feature Request
description: 为 Iridium 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的建议！
        请描述你希望看到的功能，以及它解决了什么痛点。

  - type: textarea
    id: problem
    attributes:
      label: 当前痛点
      description: 这个功能解决的是什么问题？目前的体验有什么不足？
      placeholder: |
        例如：在 3.1.0 版本中，UI 帧率不稳定，希望增加一个帧率锁定选项。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望 Iridium 如何实现这个功能？
      placeholder: |
        例如：在设置页面新增一个"锁定 UI 帧率"的开关。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有没有其他变通方法或替代方案？
      placeholder: 目前通过修改配置文件勉强实现，但操作繁琐。

  - type: checkboxes
    id: confirmation
    attributes:
      label: 确认
      options:
        - label: 我确认这是一个 Iridium 能解决的游戏问题，而非游戏本身的功能缺失
          required: true
