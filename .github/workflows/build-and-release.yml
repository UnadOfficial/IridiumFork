name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'r*' ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - game-version: v2.9.8
            project-dir: main
            project-file: Iridium.csproj
          - game-version: v2.10.0
            project-dir: frontline
            project-file: Iridium_frontline.csproj
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build project (${{ matrix.game-version }})
      run: dotnet build ${{ matrix.project-dir }}/${{ matrix.project-file }} --configuration Release

    - name: Get version
      id: get_version
      shell: bash
      run: |
        output=$(node scripts/get-version.js ${{ matrix.project-dir }} ${{ matrix.game-version }})
        while IFS= read -r line; do
          if [[ $line =~ ^VERSION_TAG=(.*)$ ]]; then
            version="${BASH_REMATCH[1]}"
            echo "VERSION_TAG=$version" >> $GITHUB_OUTPUT
          fi
        done <<< "$output"

    - name: Package artifacts
      shell: bash
      run: |
        version="${{ steps.get_version.outputs.VERSION_TAG }}"
        zipName="Iridium_${version}.zip"
        cd out/${{ matrix.project-dir }}
        zip -r "../../${zipName}" .
        cd ../..

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iridium-build-${{ matrix.game-version }}
        path: Iridium_*.zip
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/r')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: iridium-build-*
        merge-multiple: true

    - name: List downloaded artifacts
      shell: bash
      run: ls -la *.zip

    - name: Get version info
      id: version_info
      shell: bash
      run: |
        output=$(node scripts/get-version.js main)
        while IFS= read -r line; do
          if [[ $line =~ ^(VERSION_TAG|RELEASE_NAME|TAG_NAME|BASE_TAG)=(.*)$ ]]; then
            key="${BASH_REMATCH[1]}"
            value="${BASH_REMATCH[2]}"
            echo "$key=$value" >> $GITHUB_OUTPUT
          fi
        done <<< "$output"

    - name: Check for existing release
      id: check_release
      uses: actions/github-script@v7
      with:
        script: |
          const releaseName = `${{ steps.version_info.outputs.BASE_TAG }}`;

          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existingRelease = releases.data.find(r => r.name === releaseName);

            if (existingRelease) {
              core.setOutput('release_exists', 'true');
              core.setOutput('existing_release_id', existingRelease.id);
            } else {
              core.setOutput('release_exists', 'false');
            }
          } catch (error) {
            core.setOutput('release_exists', 'false');
          }

    - name: Create or update release
      id: create_release
      uses: actions/github-script@v7
      with:
        script: |
          const { getCommitLog, generateReleaseBody } = require('./scripts/generate-release.js');

          const releaseName = `${{ steps.version_info.outputs.BASE_TAG }}`;
          const versionTag = `${{ steps.version_info.outputs.BASE_TAG }}`;
          const tagName = `${{ steps.version_info.outputs.TAG_NAME }}`;
          const releaseExists = `${{ steps.check_release.outputs.release_exists }}` === 'true';
          const existingReleaseId = `${{ steps.check_release.outputs.existing_release_id }}`;
          const shortSha = context.sha.substring(0, 7);

          let finalReleaseName = releaseName;
          let finalTagName = tagName;

          if (releaseExists) {
            finalReleaseName = `${releaseName} (${shortSha})`;
            finalTagName = `${tagName}_${shortSha}`;
          }

          const commits = getCommitLog();
          const releaseBody = generateReleaseBody(versionTag, context.sha, commits);

          try {
            if (releaseExists) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(existingReleaseId)
              });
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: finalTagName,
              name: finalReleaseName,
              body: releaseBody,
              draft: false,
              prerelease: versionTag.includes('beta') || versionTag.includes('prerelease')
            });

            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);

          } catch (error) {
            core.setFailed(`Failed to create release: ${error.message}`);
          }

    - name: Upload release assets (both versions)
      uses: actions/github-script@v7
      env:
        RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const releaseId = parseInt(process.env.RELEASE_ID);

          const zipFiles = fs.readdirSync('.').filter(f => f.startsWith('Iridium_') && f.endsWith('.zip'));

          if (zipFiles.length === 0) {
            core.setFailed('No zip files found to upload');
            return;
          }

          for (const zipFile of zipFiles) {
            const fileContent = fs.readFileSync(zipFile);
            try {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: zipFile,
                data: fileContent,
                headers: {
                  'content-type': 'application/zip',
                  'content-length': fileContent.length
                }
              });
              console.log(`Uploaded: ${zipFile}`);
            } catch (error) {
              core.setFailed(`Failed to upload ${zipFile}: ${error.message}`);
            }
          }