name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build solution
    runs-on: windows-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore dependencies
      shell: pwsh
      run: |
        dotnet restore main/Iridium.csproj
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet restore architectury/Iris.Iml/Iris.Iml.csproj
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet restore loaders/ummloader/Iridium.Loader.UMM.csproj
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        
    - name: Build supported projects
      shell: pwsh
      run: |
        dotnet build main/Iridium.csproj --configuration Release --no-restore -p:AutoLaunchGame=false
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet build architectury/Iris.Iml/Iris.Iml.csproj --configuration Release --no-restore
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet build loaders/ummloader/Iridium.Loader.UMM.csproj --configuration Release --no-restore -p:AutoLaunchGame=false
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        
    - name: Get version
      id: get_version
      shell: pwsh
      run: |
        node scripts/get-version.js | ForEach-Object {
          if ($_ -match '^VERSION_TAG=(.+)$') {
            "VERSION_TAG=$($Matches[1])" >> $env:GITHUB_OUTPUT
          }
        }
        
    - name: Package artifacts
      shell: pwsh
      run: |
        $zipName = "Iridium_${{ steps.get_version.outputs.VERSION_TAG }}.zip"
        if (-not (Test-Path out)) {
          throw "Build output directory 'out' was not created."
        }
        Compress-Archive -Path out\* -DestinationPath $zipName
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iridium-build
        path: Iridium_*.zip
        retention-days: 7
        
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: iridium-build
        
    - name: Get version info
      id: version_info
      shell: bash
      run: |
        output=$(node scripts/get-version.js)
        while IFS= read -r line; do
          if [[ $line =~ ^(VERSION_TAG|RELEASE_NAME|TAG_NAME)=(.*)$ ]]; then
            key="${BASH_REMATCH[1]}"
            value="${BASH_REMATCH[2]}"
            echo "$key=$value" >> $GITHUB_OUTPUT
          fi
        done <<< "$output"
        
    - name: Check for existing release
      id: check_release
      uses: actions/github-script@v7
      with:
        script: |
          const releaseName = `${{ steps.version_info.outputs.RELEASE_NAME }}`;
          
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existingRelease = releases.data.find(r => r.name === releaseName);
            
            if (existingRelease) {
              core.setOutput('release_exists', 'true');
              core.setOutput('existing_release_id', existingRelease.id);
            } else {
              core.setOutput('release_exists', 'false');
            }
          } catch (error) {
            core.setOutput('release_exists', 'false');
          }
        
    - name: Create or update release
      id: create_release
      uses: actions/github-script@v7
      with:
        script: |
          const { getCommitLog, generateReleaseBody } = require('./scripts/generate-release.js');
          
          const releaseName = `${{ steps.version_info.outputs.RELEASE_NAME }}`;
          const versionTag = `${{ steps.version_info.outputs.VERSION_TAG }}`;
          const tagName = `${{ steps.version_info.outputs.TAG_NAME }}`;
          const releaseExists = `${{ steps.check_release.outputs.release_exists }}` === 'true';
          const existingReleaseId = `${{ steps.check_release.outputs.existing_release_id }}`;
          const shortSha = context.sha.substring(0, 7);
          
          let finalReleaseName = releaseName;
          let finalTagName = tagName;
          
          if (releaseExists) {
            finalReleaseName = `${releaseName} (${shortSha})`;
            finalTagName = `${tagName}_${shortSha}`;
          }
          
          // 获取commit日志
          const commits = getCommitLog();
          const releaseBody = generateReleaseBody(versionTag, context.sha, commits);
          
          try {
            if (releaseExists) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(existingReleaseId)
              });
            }
            
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: finalTagName,
              name: finalReleaseName,
              body: releaseBody,
              draft: false,
              prerelease: versionTag.includes('beta') || versionTag.includes('prerelease')
            });
            
            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);
            
          } catch (error) {
            core.setFailed(`Failed to create release: ${error.message}`);
          }
        
    - name: Upload release asset
      uses: actions/github-script@v7
      env:
        RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
      with:
        script: |
          const fs = require('fs');
          const releaseId = parseInt(process.env.RELEASE_ID);
          const files = fs.readdirSync('.');
          const zipFile = files.find(f => f.startsWith('Iridium_') && f.endsWith('.zip'));
          
          if (!zipFile) {
            core.setFailed('No zip file found to upload');
            return;
          }
          
          const fileContent = fs.readFileSync(zipFile);
          
          try {
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: zipFile,
              data: fileContent,
              headers: {
                'content-type': 'application/zip',
                'content-length': fileContent.length
              }
            });
          } catch (error) {
            core.setFailed(`Failed to upload asset: ${error.message}`);
          }
