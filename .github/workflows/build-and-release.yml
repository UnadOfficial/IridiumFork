name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Build project
      run: dotnet build --configuration Release
        
    - name: Get version
      id: get_version
      shell: pwsh
      run: |
        $output = node scripts/get-version.js
        foreach ($line in $output -split "`n") {
          if ($line -match "^VERSION_TAG=(.*)$") {
            $version = $matches[1]
            echo "VERSION_TAG=$version" >> $env:GITHUB_OUTPUT
          }
        }
        
    - name: Package artifacts
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION_TAG }}"
        $zipName = "Iridium_$version.zip"
        
        if (!(Test-Path "out")) {
          New-Item -ItemType Directory -Path "out" -Force | Out-Null
        }
        
        Push-Location "out"
        try {
          $items = Get-ChildItem -Path "." -Force
          if ($items.Count -gt 0) {
            Compress-Archive -Path "*" -DestinationPath "../$zipName" -Force
          } else {
            Compress-Archive -Path "*" -DestinationPath "../$zipName" -Force
          }
        } finally {
          Pop-Location
        }
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iridium-build
        path: Iridium_*.zip
        retention-days: 7
        
  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: iridium-build
        
    - name: Get version info
      id: version_info
      shell: pwsh
      run: |
        $output = node scripts/get-version.js
        foreach ($line in $output -split "`n") {
          if ($line -match "^(VERSION_TAG|RELEASE_NAME)=(.*)$") {
            $key = $matches[1]
            $value = $matches[2]
            echo "$key=$value" >> $env:GITHUB_OUTPUT
          }
        }
        
    - name: Check for existing release
      id: check_release
      uses: actions/github-script@v7
      with:
        script: |
          const releaseName = `${{ steps.version_info.outputs.RELEASE_NAME }}`;
          
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existingRelease = releases.data.find(r => r.name === releaseName);
            
            if (existingRelease) {
              core.setOutput('release_exists', 'true');
              core.setOutput('existing_release_id', existingRelease.id);
            } else {
              core.setOutput('release_exists', 'false');
            }
          } catch (error) {
            core.setOutput('release_exists', 'false');
          }
        
    - name: Create or update release
      id: create_release
      uses: actions/github-script@v7
      with:
        script: |
          const releaseName = `${{ steps.version_info.outputs.RELEASE_NAME }}`;
          const versionTag = `${{ steps.version_info.outputs.VERSION_TAG }}`;
          const releaseExists = `${{ steps.check_release.outputs.release_exists }}` === 'true';
          const existingReleaseId = `${{ steps.check_release.outputs.existing_release_id }}`;
          const shortSha = context.sha.substring(0, 7);
          
          let finalReleaseName = releaseName;
          let tagName = `v${versionTag}`;
          
          if (releaseExists) {
            finalReleaseName = `${releaseName} (${shortSha})`;
            tagName = `v${versionTag}-${shortSha}`;
          }
          
          const releaseBody = `## Iridium Mod Release

**Version:** ${versionTag}
**Commit:** ${context.sha}
**Build Date:** ${new Date().toISOString().split('T')[0]}

### Changes
- Auto-generated release from GitHub Actions
- Built from commit ${context.sha}

### Installation
1. Download the attached zip file
2. Extract to your A Dance of Fire and Ice Mods folder
3. Launch the game and enjoy!`;
          
          try {
            if (releaseExists) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(existingReleaseId)
              });
            }
            
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: finalReleaseName,
              body: releaseBody,
              draft: false,
              prerelease: versionTag.includes('beta') || versionTag.includes('prerelease')
            });
            
            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);
            
          } catch (error) {
            core.setFailed(`Failed to create release: ${error.message}`);
          }
        
    - name: Upload release asset
      uses: actions/github-script@v7
      env:
        RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
      with:
        script: |
          const fs = require('fs');
          const releaseId = parseInt(process.env.RELEASE_ID);
          const files = fs.readdirSync('.');
          const zipFile = files.find(f => f.startsWith('Iridium_') && f.endsWith('.zip'));
          
          if (!zipFile) {
            core.setFailed('No zip file found to upload');
            return;
          }
          
          const fileContent = fs.readFileSync(zipFile);
          
          try {
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: zipFile,
              data: fileContent,
              headers: {
                'content-type': 'application/zip',
                'content-length': fileContent.length
              }
            });
          } catch (error) {
            core.setFailed(`Failed to upload asset: ${error.message}`);
          }